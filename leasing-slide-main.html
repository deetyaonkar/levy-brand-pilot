<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Leasing Slide — Levy Legacy Group.</title>
<style>
  :root {
    --navy:     #01133D;
    --navy-mid: #091A4A;
    --green:    #01FFB7;
    --blue:     #4C4DC3;
    --blue-lt:  #97B9FF;
    --white:    #FFFFFF;
    --cream:    #F9F7F3;
    --serif: Palatino Linotype, Palatino, Book Antiqua, Georgia, serif;
    --sans:  -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  body {
    width: 1920px;
    height: 1080px;
    min-width: 1920px;
    min-height: 1080px;
    max-width: 1920px;
    max-height: 1080px;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    background: var(--navy);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    color: var(--white);
  }

  .slide {
    width: 1920px;
    height: 1080px;
    display: grid;
    grid-template-columns: 900px 1fr;
    overflow: hidden;
  }

  /* ── LEFT: PHOTO ── */
  .slide-photo {
    width: 900px;
    height: 1080px;
    background: var(--navy-mid);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-shrink: 0;
  }
  .slide-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: absolute;
    inset: 0;
  }
  .photo-placeholder-icon {
    width: 64px; height: 64px;
    border: 1px solid rgba(76,77,195,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-placeholder-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }
  /* Gradient bleed from photo into right panel */
  .slide-photo::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 120px;
    background: linear-gradient(to right, transparent, var(--navy));
    pointer-events: none;
  }

  /* ── RIGHT: CONTENT ── */
  .slide-content {
    height: 1080px;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    padding: 72px 80px 60px 60px;
    position: relative;
    overflow: hidden;
  }

  /* Loop decorative — navy only, behind content */
  .loop-decor {
    position: absolute;
    bottom: -80px;
    right: -200px;
    width: 900px;
    pointer-events: none;
    opacity: 0.1;
  }
  .loop-decor svg { width: 100%; height: auto; }

  /* LOGO */
  .slide-logo {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1;
    margin-bottom: auto;
  }
  .logo-levy { color: var(--green); }
  .logo-rest { color: var(--white); }

  /* KICKER */
  .slide-kicker {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
  }
  .slide-kicker::before {
    content: '';
    display: inline-block;
    width: 32px;
    height: 1.5px;
    background: var(--green);
  }

  /* ADDRESS */
  .slide-address {
    font-family: var(--serif);
    font-size: 96px;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .slide-city {
    font-size: 16px;
    color: var(--blue-lt);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 52px;
    position: relative;
    z-index: 1;
  }

  /* STATS */
  .slide-stats {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 0;
    margin-bottom: 56px;
    position: relative;
    z-index: 1;
    width: fit-content;
  }
  .slide-stat {
    padding-right: 36px;
    margin-right: 36px;
    border-right: 1px solid rgba(76,77,195,0.3);
  }
  .slide-stat:last-child {
    border-right: none;
    margin-right: 0;
    padding-right: 0;
  }
  .slide-stat-value {
    font-family: var(--serif);
    font-size: 48px;
    line-height: 1;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
  }
  .slide-stat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blue-lt);
  }

  /* PRICE */
  .slide-price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 52px;
    position: relative;
    z-index: 1;
  }
  .slide-price {
    font-family: var(--serif);
    font-size: 56px;
    color: var(--green);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .slide-price em {
    font-style: normal;
    font-size: 24px;
    color: var(--green);
    vertical-align: super;
    font-family: var(--sans);
  }
  .slide-price-label {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  /* DIVIDER */
  .slide-divider {
    width: 100%;
    height: 1px;
    background: rgba(76,77,195,0.25);
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  /* CONTACT ROW */
  .slide-contact {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .contact-person {}
  .contact-name-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blue-lt);
    margin-bottom: 4px;
  }
  .contact-name {
    font-family: var(--serif);
    font-size: 24px;
    color: var(--white);
    line-height: 1;
  }
  .contact-items {
    display: flex;
    gap: 40px;
  }
  .contact-item {}
  .contact-item-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blue-lt);
    margin-bottom: 4px;
  }
  .contact-item-value {
    font-size: 15px;
    color: var(--white);
  }

  /* AVAIL BADGE */
  .avail-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
    padding: 10px 20px;
    border: 1px solid rgba(1,255,183,0.3);
  }
  .avail-badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
  }
</style>
</head>
